name: backend CI/CD

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: saju-backend
  ECS_CLUSTER: saju-prod
  ECS_SERVICE: saju-backend
  ECS_TASK_FAMILY: saju-backend

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle build
        run: ./gradlew --no-daemon clean build -x test

      - name: Run tests
        run: ./gradlew --no-daemon test

  deploy:
    name: Deploy to ECS
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/${ECR_REPOSITORY}:${GITHUB_SHA::8}
          docker build -t $IMAGE -t $REGISTRY/${ECR_REPOSITORY}:latest backend
          docker push $IMAGE
          docker push $REGISTRY/${ECR_REPOSITORY}:latest
          echo "image=$IMAGE" >> $GITHUB_ENV

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/infra/ecs/task-definition.json
          container-name: saju-backend
          image: ${{ env.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
