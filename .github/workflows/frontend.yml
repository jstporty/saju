name: frontend CI

# 실배포는 Vercel(GitHub 통합)이 main 푸시 + PR Preview 자동 처리.
# 이 워크플로우는 PR 검증용 빌드/타입체크 전용.

on:
  pull_request:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

jobs:
  build:
    name: Build & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://api.saju.app
          NEXT_PUBLIC_APP_URL: https://saju.app
