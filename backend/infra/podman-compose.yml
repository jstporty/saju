version: '3.8'

services:
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: saju-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: saju
      MYSQL_PASSWORD: saju1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init-saju-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saju-network

  localstack:
    image: docker.io/localstack/localstack:3.8
    container_name: saju-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,secretsmanager
      DEFAULT_REGION: ap-northeast-2
      AWS_DEFAULT_REGION: ap-northeast-2
      LOCALSTACK_AUTH_TOKEN: ""
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saju-network

volumes:
  mysql_data:
  localstack_data:

networks:
  saju-network:
    driver: bridge
