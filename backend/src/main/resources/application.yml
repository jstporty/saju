server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: saju-backend

  datasource:
    url: jdbc:mysql://127.0.0.1:${DB_PORT:3306}/saju_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:saju}
    password: ${DB_PASSWORD:saju1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never   # Flyway가 SPRING_SESSION 테이블 관리
    timeout: 14d

  cache:
    type: caffeine

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# LocalStack (ADR-16): 로컬 AWS 에뮬레이션
cloud:
  aws:
    credentials:
      access-key: test
      secret-key: test
    region:
      static: ap-northeast-2
    endpoint: http://localhost:4566
    stack:
      auto: false

huggingface:
  api:
    base-url: https://router.huggingface.co
    token: ${HF_TOKEN:}
    model-id: ${HF_MODEL_ID:meta-llama/Llama-3.1-8B-Instruct}
    timeout: 30000
    max-tokens: 4096
    temperature: 0.7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.company.saju: DEBUG
    org.flywaydb: INFO
